name: Build Desktop Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    env:
      # Bypass Apple code signing checks during CI build
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile and Package Application
        run: npm run dist -- --publish never

      - name: Upload Packaged Binaries
        uses: actions/upload-artifact@v4
        with:
          name: NoiseGenerator-${{ matrix.os }}-build
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
          if-no-files-found: error
          retention-days: 14
